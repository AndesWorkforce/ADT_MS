# =============================================================================
# Stack Swarm / Portainer — producción (adt-ms)
# Desplegar en Portainer o: docker stack deploy -c docker-compose.yml pulse_adt_ms
#
# Desarrollo local (NATS + build): docker compose -f docker-compose-deployment.yml up --build
# =============================================================================
version: '3.8'

services:
  adt-ms:
    image: ghcr.io/andesworkforce/adt_ms:latest
    networks:
      - traefik-public
      - nats_nats_internal_network
      - default
      - pulse-db-prod_backend_network
      - clickhouse-prod_clickhouse-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      # Límites PROD (tabla interna: API NestJS)
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    environment:
      NODE_ENV: production
      TZ: 'America/New_York'
      EVENTS_TIMEZONE: 'America/New_York'
      PORT: '${PORT:-3005}'
      DATABASE_URL: '${DATABASE_URL}'
      NATS_HOST: '${NATS_HOST:-72.61.129.234}'
      NATS_PORT: '${NATS_PORT:-4222}'
      NATS_USERNAME: '${NATS_USERNAME:-andes_nats}'
      NATS_PASSWORD: '${NATS_PASSWORD:-andesworkforce_nats}'
      REDIS_HOST: '${REDIS_HOST}'
      REDIS_PORT: '${REDIS_PORT:-6379}'
      REDIS_PASSWORD: '${REDIS_PASSWORD:-}'
      REDIS_DB: '${REDIS_DB:-0}'
      REDIS_QUEUE_DB: '${REDIS_QUEUE_DB:-1}'
      USE_ETL_QUEUE: '${USE_ETL_QUEUE:-true}'
      DEV_LOGS: '${DEV_LOGS:-true}'
      ENVIRONMENT: '${ENVIRONMENT:-production}'

networks:
  default:
    name: andes-adt-ms-net
    driver: overlay
  traefik-public:
    external: true
  nats_nats_internal_network:
    external: true
  pulse-db-prod_backend_network:
    external: true
  clickhouse-prod_clickhouse-network:
    external: true
